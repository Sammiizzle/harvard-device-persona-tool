<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Harvard Device Recommendation Tool</title>
  <style>
    body {
      font-family: Arial, Helvetica, sans-serif;
      background: #f5f5f5;
      margin: 0;
      padding: 0;
      min-height: 100vh;
    }

    .topbar {
      background: black;
      height: 87px;
      display: flex;
      align-items: center;
    }

    .topbar-container {
      width: 1200px;
      margin: auto;
    }

    .logo {
      height: 80px;
    }

    .page-container {
      width: 900px;
      margin: 60px auto;
      background: white;
      padding: 42px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      border-radius: 4px;
    }

    h1 {
      margin-top: 0;
      font-size: 32px;
      color: #222;
    }

    .subtitle {
      color: #666;
      margin-bottom: 30px;
    }

    .tool-box {
      display: flex;
      gap: 10px;
      margin-bottom: 30px;
    }

    input {
      flex: 1;
      padding: 12px;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }

    button {
      background: #a6053b;
      color: white;
      border: none;
      padding: 12px 20px;
      font-size: 16px;
      border-radius: 4px;
      cursor: pointer;
    }

    button:hover {
      background: #8c1626;
    }

    #result {
      margin-top: 30px;
      padding: 25px;
      background: #fafafa;
      border: 1px solid #eee;
      border-radius: 4px;
    }

    .device {
      padding: 8px;
      background: #efefef;
      margin-top: 6px;
      border-radius: 4px;
    }

    .resultCard {
      margin-top: 30px;
      padding: 20px;
      background: #fafafa;
      border-left: 5px solid #A51C30;
      border-radius: 6px;
      overflow-wrap: break-word;
    }
  </style>
</head>

<body>
  <header class="topbar">
    <div class="topbar-container">
      <img src="HarvardLogo.png" class="logo" alt="Harvard Logo">
    </div>
  </header>

  <div class="page-container">
    <h1>Device Refresh Tool</h1>
    <p class="subtitle">Enter your Harvard ID to view your recommended refresh device.</p>

    <div class="tool-box">
      <input type="text" id="harvardID" placeholder="Enter Harvard ID">
      <button id="lookupBtn" onclick="lookupUser()">Find My Recommendation</button>
    </div>

    <div id="result"></div>
  </div>

  <script>


    const users = {};

    const deviceMatrix = {
      Core: [
        { name: "Dell Pro Plus 13/14", url: "https://www.dell.com/en-us/shop/dell-laptops/dell-pro-13-plus-laptop-or-2-in-1/spd/dell-pro-pb13250-2-in-1-laptop/bts114_pb13250_usx" },
        { name: "MacBook Air M4", url: "https://www.apple.com/macbook-air/" },
        { name: "MacBook Pro 14 M4 Pro", url: "https://www.apple.com/shop/buy-mac/macbook-pro" }
      ],
      Advanced: [
        { name: "Dell Pro Max 14/16", url: "https://www.dell.com/en-us/shop/dell-laptops/dell-pro-max-14-laptop/spd/dell-pro-max-mc14250-laptop" },
        { name: "MacBook Pro 14 M4 Pro", url: "https://www.apple.com/shop/buy-mac/macbook-pro" }
      ],
      Fixed: [
        { name: "Dell Pro Slim Desktop", url: "https://www.dell.com/en-us/shop/desktop-computers/dell-pro-slim-desktop/spd/dell-pro-qcs1250-slim-desktop" },
        { name: "Dell Pro All-in-One", url: "https://www.dell.com/en-us/shop/desktop-computers/dell-pro-24-all-in-one-plus-desktop/spd/dell-pro-qb24250-aio" },
        { name: "iMac M4 Pro", url: "https://www.apple.com/shop/buy-mac/imac" }
      ],
      Mobile: [
        { name: "Dell Pro 13 Premium", url: "https://www.dell.com/en-us/shop/dell-laptops/dell-pro-13-premium-laptop/spd/dell-pro-13-premium" },
        { name: "MacBook Air M4", url: "https://www.apple.com/macbook-air/" }
      ]
    };


    const csvText = `
Harvard ID,Name,classdescription,jobfamily,jobtitle,businesstitle,persona
60846642,Eric Thompson,Admin & Professional,IT Enterprise Management,IT Service Management Mgt V,Associate Director Endpoint Solutions,Power & Specialist Users- Core
60917469,Bailey Andrews,Admin & Professional,IT Project Management,IT Program Manager V,IT Program Manager Endpoint Solutions,Academic & Administrative Professional Users- Advanced
81401640,Jenn Vasconcelos,Admin & Professional,IT Enterprise Management,IT Service Management Mgt V,Associate Director Client Services PMO,Power & Specialist Users- Core
71775372,Samantha Diaz,Admin & Professional,Administrative/Refresh Coordinator,IT Procurement and Refresh,Not applicable,Academic & Administrative Professional Users- Core
80849052,Brian Weeks,Admin & Professional,Not Assigned,Software Engineer,Associate Systems Engineer,Power & Specialist Users- Advanced
11276555,Junda Sun,Admin & Professional,Not Assigned,Software Engineer Sr,Associate Systems Engineer,Power & Specialist Users- Advanced
`.trim();

    function getPersonaGroup(personaLabel) {
      if (!personaLabel) {
        return "Core";
      }

      const lower = personaLabel.toLowerCase();

      if (lower.includes("advanced")) {
        return "Advanced";
      } else if (lower.includes("mobile")) {
        return "Mobile";
      } else if (lower.includes("fixed")) {
        return "Fixed";
      } else if (lower.includes("core")) {
        return "Core";
      } else {
        return "Core";
      }
    }

    function loadUsersFromCSV() {
      const lines = csvText.split("\n");

      for (let i = 1; i < lines.length; i++) {
        const line = lines[i].trim();
        if (line === "") continue;

        const cols = line.split(",");

        const id = cols[0].trim();
        const name = cols[1].trim();
        const classdescription = cols[2].trim();
        const jobfamily = cols[3].trim();
        const jobtitle = cols[4].trim();
        const businesstitle = cols[5].trim();
        const personaLabel = cols[6].trim();  

        users[id] = {
          name: name,
          classdescription: classdescription,
          jobfamily: jobfamily,
          jobtitle: jobtitle,
          businesstitle: businesstitle,
          personaLabel: personaLabel
        };
      }

      console.log("Users loaded:", users);
    }


    function lookupUser() {
      const idInput = document.getElementById("harvardID");
      const resultDiv = document.getElementById("result");

      const id = idInput.value.trim();

      if (id === "") {
        resultDiv.innerHTML = "<p>Please enter a Harvard ID.</p>";
        return;
      }

      let user = users[id];
      let personaLabel;
      let personaGroup;
      let safetyNetUsed = false;

      if (!user) {
        // Not in CSV >> force them into Academic & Administrative Professional Users - Core
        safetyNetUsed = true;

        personaLabel = "Academic & Administrative Professional Users- Core";
        personaGroup = "Core";

        user = {
          name: "Not found in HR file",
          classdescription: "N/A",
          jobfamily: "Academic & Administrative Professional Users",
          jobtitle: "N/A",
          businesstitle: "N/A",
          personaLabel: personaLabel
        };
      } else {
        personaLabel = user.personaLabel;
        personaGroup = getPersonaGroup(personaLabel);
      }

      const devices = deviceMatrix[personaGroup] || [];

      let html = "";

      html += "<div class='resultCard'>";
      html += "<h3>User Information</h3>";
      html += "<p><b>Harvard ID:</b> " + id + "</p>";
      html += "<p><b>Name:</b> " + user.name + "</p>";
      html += "<p><b>Class:</b> " + user.classdescription + "</p>";
      html += "<p><b>Job Family:</b> " + user.jobfamily + "</p>";
      html += "<p><b>Job Title:</b> " + user.jobtitle + "</p>";
      html += "<p><b>Business Title:</b> " + user.businesstitle + "</p>";

      if (safetyNetUsed) {
        html += "<p style='color:#b00;'><i>User not found in CSV. Safety net applied: Academic & Administrative Professional Users – Core.</i></p>";
      }

      html += "<hr>";

      html += "<h3>Persona</h3>";
      html += "<p><b>Persona Label:</b> " + personaLabel + "</p>";
      html += "<p><b>Persona Group for Devices:</b> <span style='color:#A51C30;'>" + personaGroup + "</span></p>";

      html += "<h3>Recommended Devices</h3>";

      if (devices.length === 0) {
        html += "<p>No devices found for this persona group.</p>";
      } else {
        for (let i = 0; i < devices.length; i++) {
          const device = devices[i];
          html += "<div class='device'>";
          html += "<a href='" + device.url + "' target='_blank'>" + device.name + "</a>";
          html += "</div>";
        }
      }

      html += "</div>";

      resultDiv.innerHTML = html;
    }

    loadUsersFromCSV();

    document.getElementById("harvardID").addEventListener("keypress", function (event) {
      if (event.key === "Enter") {
        event.preventDefault();
        lookupUser();
      }
    });
  </script>
</body>

</html>
