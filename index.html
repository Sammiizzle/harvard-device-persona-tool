<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Harvard Device Recommendation Tool</title>
  <style>
    body {
      font-family: Arial, Helvetica, sans-serif;
      background: #f5f5f5;
      margin: 0;
      padding: 0;
      min-height: 100vh;
    }

    .topbar {
      background: black;
      height: 87px;
      display: flex;
      align-items: center;
    }

    .topbar-container {
      width: 1200px;
      margin: auto;
    }

    .logo {
      height: 80px;
    }

    .page-container {
      width: 900px;
      margin: 60px auto;
      background: white;
      padding: 42px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      border-radius: 4px;
    }

    h1 {
      margin-top: 0;
      font-size: 32px;
      color: #222;
    }

    .subtitle {
      color: #666;
      margin-bottom: 30px;
    }

    .tool-box {
      display: flex;
      gap: 10px;
      margin-bottom: 30px;
    }

    input {
      flex: 1;
      padding: 12px;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }

    button {
      background: #a6053b;
      color: white;
      border: none;
      padding: 12px 20px;
      font-size: 16px;
      border-radius: 4px;
      cursor: pointer;
    }

    button:hover {
      background: #8c1626;
    }

    #result {
      margin-top: 30px;
      padding: 25px;
      background: #fafafa;
      border: 1px solid #eee;
      border-radius: 4px;
    }

    .device {
      padding: 8px;
      background: #efefef;
      margin-top: 6px;
      border-radius: 4px;
    }

    .resultCard {
      margin-top: 30px;
      padding: 20px;
      background: #fafafa;
      border-left: 5px solid #A51C30;
      border-radius: 6px;
      overflow-wrap: break-word;
    }
  </style>
</head>

<body>
  <header class="topbar">
    <div class="topbar-container">
      <img src="HarvardLogo.png" class="logo" alt="Harvard Logo">
    </div>
  </header>

  <div class="page-container">
    <h1>Device Refresh Tool</h1>
    <p class="subtitle">Enter your Harvard ID to view your recommended refresh device.</p>

    <div class="tool-box">
      <input type="text" id="harvardID" placeholder="Enter Harvard ID">
      <!-- Button is enabled by default now -->
      <button id="lookupBtn" onclick="lookupUser()">Find My Recommendation</button>
    </div>

    <div id="result"></div>
  </div>

  <script>
    // === 1. Embed your CSV directly here so we don't need fetch() ===
    const csvData = `
Harvard ID,Name,classdescription,jobfamily,jobtitle,businesstitle,persona
60846642,Eric Thompson,Admin & Professional,IT Enterprise Management,IT Service Management Mgt V,Associate Director, Endpoint Solutions,Power & Specialist Users- Core,
60917469,Bailey Andrews,Admin & Professional,IT Project Management,IT Program Manager V,IT Program Manager, Endpoint Solutions,Academic & Administrative Professional Users- Advanced,
81401640,Jenn Vasconcelos,Admin & Professional,IT Enterprise Management,IT Service Management Mgt V,Associate Director, Client Services Project Management Office,Power & Specialist Users- Core,
71775372,Samantha Diaz,Admin & Professional,Administrative/Refresh Coordinator,IT Procurement and Refresh,Not applicable,Academic & Administrative Professional Users- Core,
80849052,Brian Weeks,Admin & Professional,Not Assigned,Software Engineer,Associate Systems Engineer,Power & Specialist Users- Advanced,
11276555,Junda Sun,Admin & Professional,Not Assigned,Software Engineer Sr,Associate Systems Engineer,Power & Specialist Users- Advanced
`.trim();

    // === 2. Device options by core persona group ===
    const deviceMatrix = {
      Fixed: [
        { name: "Dell Pro Slim Desktop", url: "https://www.dell.com/en-us/shop/desktop-computers/dell-pro-slim-desktop/spd/dell-pro-qcs1250-slim-desktop" },
        { name: "Dell Pro All-in-One", url: "https://www.dell.com/en-us/shop/desktop-computers/dell-pro-24-all-in-one-plus-desktop/spd/dell-pro-qb24250-aio" },
        { name: "iMac M4 Pro", url: "https://www.apple.com/shop/buy-mac/imac" }
      ],
      Core: [
        { name: "Dell Pro Plus 13/14", url: "https://www.dell.com/en-us/shop/dell-laptops/dell-pro-13-plus-laptop-or-2-in-1/spd/dell-pro-pb13250-2-in-1-laptop/bts114_pb13250_usx" },
        { name: "MacBook Air M4", url: "https://www.apple.com/macbook-air/" },
        { name: "MacBook Pro 14 M4 Pro", url: "https://www.apple.com/shop/buy-mac/macbook-pro" }
      ],
      Mobile: [
        { name: "Dell Pro 13 Premium", url: "https://www.dell.com/en-us/shop/dell-laptops/dell-pro-13-premium-laptop/spd/dell-pro-13-premium" },
        { name: "MacBook Air M4", url: "https://www.apple.com/macbook-air/" }
      ],
      Advanced: [
        { name: "Dell Pro Max 14/16", url: "https://www.dell.com/en-us/shop/dell-laptops/dell-pro-max-14-laptop/spd/dell-pro-max-mc14250-laptop" },
        { name: "MacBook Pro 14 M4 Pro", url: "https://www.apple.com/shop/buy-mac/macbook-pro" }
      ]
    };

    // Will hold parsed users keyed by Harvard ID
    const users = {};

    // === 3. Helper: map full persona labels to the core group we use for devices ===
    function mapPersonaToGroup(personaLabel) {
      if (!personaLabel) return "Core";
      const p = personaLabel.toLowerCase();

      if (p.includes("advanced")) return "Advanced";
      if (p.includes("mobile")) return "Mobile";
      if (p.includes("fixed")) return "Fixed";
      if (p.includes("core")) return "Core";

      // default safety
      return "Core";
    }

    function capitalize(str) {
      if (!str) return "";
      return str.charAt(0).toUpperCase() + str.slice(1).toLowerCase();
    }

    // === 4. Parse the embedded CSV into `users` object ===
    function loadUsersFromEmbeddedCSV() {
      const lines = csvData.split(/\r?\n/);
      // First row is header
      const dataLines = lines.slice(1);

      dataLines.forEach(line => {
        if (!line.trim()) return;

        const cols = line.split(",");

        // Because business title contains commas and there's a trailing comma,
        // we reconstruct columns like this:
        //
        // 0: Harvard ID
        // 1: Name
        // 2: classdescription
        // 3: jobfamily
        // 4: jobtitle
        // 5..(n-2): businesstitle (may contain commas)
        // (n-2): persona
        // (n-1): "" (if there was a trailing comma)
        const id = (cols[0] || "").trim();
        if (!id) return;

        const name = (cols[1] || "Unknown").trim();
        const classdescription = (cols[2] || "Unknown").trim();
        const jobfamily = (cols[3] || "Unknown").trim();
        const jobtitle = (cols[4] || "Unknown").trim();

        // persona is second-to-last column (because there's often a trailing comma)
        const personaIndex = cols.length - 2;
        let personaLabel = (cols[personaIndex] || "").trim();

        // business title is everything between index 5 and personaIndex
        let businesstitle = "";
        if (personaIndex > 5) {
          businesstitle = cols.slice(5, personaIndex).join(",").trim();
        } else {
          businesstitle = (cols[5] || "Unknown").trim();
        }

        users[id] = {
          name,
          classdescription,
          jobfamily,
          jobtitle,
          businesstitle,
          personaLabel // full label from CSV, e.g. "Power & Specialist Users- Core"
        };
      });

      console.log("Parsed users:", users);
    }

    // === 5. Main lookup ===
    function lookupUser() {
      const id = document.getElementById("harvardID").value.trim();
      const resultDiv = document.getElementById("result");

      if (!id) {
        resultDiv.innerHTML = "<p>Please enter a Harvard ID.</p>";
        return;
      }

      let user = users[id];
      let personaLabel;
      let personaGroup;
      let safetyNetApplied = false;

      if (!user) {
        // SAFETY NET:
        // For any unfound Harvard ID, route them to:
        // "Academic & Administrative Professional Users- Core"
        safetyNetApplied = true;

        personaLabel = "Academic & Administrative Professional Users- Core";
        personaGroup = "Core";

        user = {
          name: "Not found in HR file",
          classdescription: "N/A",
          jobfamily: "Academic & Administrative Professional Users​",
          jobtitle: "N/A",
          businesstitle: "N/A",
          personaLabel
        };
      } else {
        personaLabel = user.personaLabel || "Academic & Administrative Professional Users- Core";
        personaGroup = mapPersonaToGroup(personaLabel);
      }

      const devices = deviceMatrix[personaGroup] || [];

      let output = `
        <h3>User Information</h3>
        <p><b>Harvard ID:</b> ${id}</p>
        <p><b>Name:</b> ${user.name}</p>
        <p><b>Class:</b> ${user.classdescription}</p>
        <p><b>Job Family:</b> ${user.jobfamily}</p>
        <p><b>Job Title:</b> ${user.jobtitle}</p>
        <p><b>Business Title:</b> ${user.businesstitle}</p>
      `;

      if (safetyNetApplied) {
        output += `
          <p style="color:#b00;"><i>User not found in CSV. Safety net applied:
          Academic & Administrative Professional Users​ – Core persona.</i></p>
        `;
      }

      output += `
        <hr>
        <h3>Persona:</h3>
        <p><b>Persona Label:</b> ${personaLabel}</p>
        <p><b>Persona Group for Devices:</b> <span style="color:#A51C30;">${personaGroup}</span></p>
        <h3>Recommended Devices</h3>
      `;

      if (devices.length === 0) {
        output += `<p>No devices configured for persona group "${personaGroup}".</p>`;
      } else {
        devices.forEach(device => {
          output += `
            <div class="device">
              <a href="${device.url}" target="_blank">${device.name}</a>
            </div>
          `;
        });
      }

      resultDiv.innerHTML = `<div class="resultCard">${output}</div>`;
    }

    // === 6. Init: parse CSV & enable Enter key ===
    loadUsersFromEmbeddedCSV();

    document.getElementById("harvardID").addEventListener("keypress", function (event) {
      if (event.key === "Enter") {
        event.preventDefault();
        lookupUser();
      }
    });
  </script>
</body>

</html>
