<!DOCTYPE html>
<html>

<head>
<title>Harvard Device Recommendation Tool</title>
<style>

body{
font-family: Arial, Helvetica, sans-serif;
background:#f5f5f5;
margin:0;
padding:0;
}

.header{
background:#A51C30;
color:white;
padding:20px 40px;
font-size:24px;
font-weight:bold;
}

.container{
max-width:800px;
margin:40px auto;
background:white;
padding:40px;
border-radius:8px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

input{
width:100%;
padding:12px;
font-size:16px;
border:1px solid #ccc;
border-radius:6px;
}

button{
background:#A51C30;
color:white;
border:none;
padding:12px 20px;
font-size:16px;
border-radius:6px;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#8e1829;
}

.resultCard{
margin-top:30px;
padding:20px;
background:#fafafa;
border-left:5px solid #A51C30;
border-radius:6px;
}

.device{
padding:8px;
background:#efefef;
margin-top:6px;
border-radius:4px;
}

</style>
</head>
<body>

<div class="header">
Harvard University IT — Device Persona Tool
</div>

<div class="container">

<h2>Device Recommendation</h2>

<p>Enter your Harvard ID to view your recommended refresh device.</p>

<input type="text" id="harvardID" placeholder="Enter Harvard ID">

<br><br>

<button onclick="lookupUser()">Find My Recommendation</button>

<div id="result"></div>

</div>

<script>

let users = {};
const deviceMatrix = {

Fixed: [
"Dell Pro Slim Desktop",
"Dell Pro All-in-One",
"iMac M4 Pro"
],

Core: [
"Dell Pro Plus 13/14",
"MacBook Air M4",
"MacBook Pro 14 M4 Pro"
],

Mobile: [
"Dell Pro 13 Premium",
"MacBook Air M4"
],

Advanced: [
"Dell Pro Max 14/16",
"MacBook Pro 14 M4 Pro"
]

};

async function loadUsers() {

const response = await fetch("users.csv");
const data = await response.text();

const rows = data.split("\n").slice(1);

rows.forEach(row => {

const cols = row.split(",");

const id = cols[0].trim();

users[id] = {
name: cols[1],
jobCode: cols[2],
jobTitle: cols[3],
jobClass: cols[4],
jobFamily: cols[5],
level: cols[6],
persona: cols[7]
};

});

console.log("Users loaded:", users);

}

loadUsers();

function lookupUser(){

let id = document.getElementById("harvardID").value;

let user = users[id];

if(!user){

document.getElementById("result").innerHTML =
"<p>User not found in prototype dataset.</p>";

return;

}

let devices = deviceMatrix[user.persona];

let output = `
<h3>User Information</h3>
<p><b>Name:</b> ${user.name}</p>
<p><b>Job Code:</b> ${user.jobCode}</p>
<p><b>Job Title:</b> ${user.jobTitle}</p>
<p><b>Job Class:</b> ${user.jobClass}</p>
<p><b>Job Family:</b> ${user.jobFamily}</p>
<p><b>Career Level:</b> ${user.level}</p>

<h3>Assigned Persona</h3>
<p>${user.persona}</p>

<h3>Recommended Devices</h3>
`;

devices.forEach(device => {
output += `<div class="device">${device}</div>`;
});

document.getElementById("result").innerHTML =
`<div class="resultCard">${output}</div>`;
}

</script>

</body>

</html>
